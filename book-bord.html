<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Bord - Harbin Kitchen</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .booking-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .booking-header {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, var(--primary) 0%, #A01830 100%);
      color: white;
      border-radius: 16px;
      margin-bottom: 30px;
    }
    .booking-header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .booking-header p {
      font-size: 16px;
      opacity: 0.9;
    }
    .booking-form {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 15px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    .submit-btn:hover {
      background: #A01830;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .success-message {
      display: none;
      text-align: center;
      padding: 40px 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .success-message.show {
      display: block;
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    .success-message h2 {
      color: var(--primary);
      margin-bottom: 12px;
    }
    .success-message p {
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
    }
    .error-message {
      display: none;
      background: #FEE;
      color: #C00;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .error-message.show {
      display: block;
    }
    .required {
      color: var(--primary);
    }
    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="booking-container">
    <div class="booking-header">
      <h1>🍜 Harbin Kitchen</h1>
      <p>Book et bord / 预订餐桌</p>
    </div>

    <!-- 订桌表单 -->
    <form class="booking-form" id="booking-form">
      <div class="error-message" id="error-message"></div>

      <div class="form-group">
        <label>Navn / 姓名 <span class="required">*</span></label>
        <input type="text" id="booking-name" required placeholder="Indtast dit navn / 请输入姓名">
      </div>

      <div class="form-group">
        <label>Telefon / 手机号 <span class="required">*</span></label>
        <input type="tel" id="booking-phone" required placeholder="f.eks. 12 34 56 78 / 例如 12 34 56 78">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Antal gæster / 人数 <span class="required">*</span></label>
          <select id="booking-guests" required>
            <option value="">Vælg / 选择</option>
            <option value="1">1 person</option>
            <option value="2">2 personer</option>
            <option value="3">3 personer</option>
            <option value="4">4 personer</option>
            <option value="5">5 personer</option>
            <option value="6">6 personer</option>
            <option value="7">7 personer</option>
            <option value="8">8 personer</option>
            <option value="9">9+ personer</option>
            <option value="10">10+ personer</option>
          </select>
        </div>

        <div class="form-group">
          <label>Dato / 日期 <span class="required">*</span></label>
          <input type="date" id="booking-date" required>
        </div>
      </div>

      <div class="form-group">
        <label>Tid / 时间 <span class="required">*</span></label>
        <select id="booking-time" required>
          <option value="">Vælg tid / 选择时间</option>
          <option value="11:30">11:30</option>
          <option value="12:00">12:00</option>
          <option value="12:30">12:30</option>
          <option value="13:00">13:00</option>
          <option value="17:00">17:00</option>
          <option value="17:30">17:30</option>
          <option value="18:00">18:00</option>
          <option value="18:30">18:30</option>
          <option value="19:00">19:00</option>
          <option value="19:30">19:30</option>
          <option value="20:00">20:00</option>
          <option value="20:30">20:30</option>
          <option value="21:00">21:00</option>
        </select>
      </div>

      <div class="form-group">
        <label>Besked / 备注</label>
        <textarea id="booking-notes" placeholder="Allergi, særlige ønsker... / 过敏、特殊要求..."></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        Bekræft booking / 确认预订
      </button>
    </form>

    <!-- 成功消息 -->
    <div class="success-message" id="success-message">
      <div class="success-icon">✅</div>
      <h2>Tak for din booking! / 预订成功！</h2>
      <p id="confirmation-details"></p>
      <p style="color: var(--primary); font-weight: 600; margin-top: 16px;">
        ⚠️ Har du ikke modtaget SMS? Ring til os: <a href="tel:+4533294646" style="color: var(--primary);">33 29 46 46</a>
        <br>
        ⚠️ 如未收到短信，请致电：<a href="tel:+4533294646" style="color: var(--primary);">33 29 46 46</a>
      </p>
      <a href="index.html" class="back-btn">Tilbage til menu / 返回菜单</a>
    </div>
  </div>

  <script>
    // 设置最小日期为今天
    const dateInput = document.getElementById('booking-date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.setAttribute('min', today);
    dateInput.value = today;

    // 加载 Supabase
    const SUPABASE_URL = 'https://glfmoqfevyeeuqbihjht.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsZm1vcWZldnllZXVxYmloamh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MTI4NDMsImV4cCI6MjA5NjQ4ODg0M30.p8WzztmQAPQQNfzOxVqBBcKSg2ONhk8_4ptsMxrPnmk';

    // 动态加载 Supabase JS
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js';
    script.onload = () => {
      window.supabase = window.supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    };
    document.head.appendChild(script);

    // 表单提交
    document.getElementById('booking-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-message');
      
      // 收集表单数据
      const booking = {
        name: document.getElementById('booking-name').value.trim(),
        phone: document.getElementById('booking-phone').value.trim(),
        guests: parseInt(document.getElementById('booking-guests').value),
        date: document.getElementById('booking-date').value,
        time: document.getElementById('booking-time').value,
        notes: document.getElementById('booking-notes').value.trim()
      };

      // 验证
      if (!booking.name || !booking.phone || !booking.guests || !booking.date || !booking.time) {
        errorMsg.textContent = '❌ Udfyld alle påkrævede felter / 请填写所有必填项';
        errorMsg.classList.add('show');
        return;
      }

      // 验证手机号格式（丹麦手机号：8位数字）
      const phoneClean = booking.phone.replace(/\s/g, '');
      if (!/^\d{8}$/.test(phoneClean)) {
        errorMsg.textContent = '❌ Indtast et gyldigt telefonnummer (8 cifre) / 请输入有效的8位手机号码';
        errorMsg.classList.add('show');
        return;
      }

      // 禁用按钮
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sender... / 提交中...';

      try {
        // 检查 Supabase 是否加载
        if (!window.supabase) {
          throw new Error('Supabase ikke indlæst / Supabase 未加载');
        }

        // 存入 bookings 表
        const { data, error } = await window.supabase
          .from('bookings')
          .insert([
            {
              name: booking.name,
              phone: phoneClean,
              guests: booking.guests,
              date: booking.date,
              time: booking.time,
              notes: booking.notes || null,
              status: 'pending'
            }
          ])
          .select()
          .single();

        if (error) {
          throw error;
        }

        // 显示成功消息
        document.getElementById('booking-form').style.display = 'none';
        document.getElementById('success-message').classList.add('show');
        
        const details = `
          <strong>${booking.name}</strong><br>
          ${booking.date} kl. ${booking.time}<br>
          ${booking.guests} personer<br>
          <br>
          ⚠️ 确认短信功能即将上线，请保存我们的电话：33 29 46 46
        `;
        document.getElementById('confirmation-details').innerHTML = details;

      } catch (error) {
        errorMsg.textContent = '❌ Der opstod en fejl: ' + error.message + ' / 提交失败，请重试。';
        errorMsg.classList.add('show');
        console.error('Booking error:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Bekræft booking / 确认预订';
      }
    });
  </script>
</body>
</html>
