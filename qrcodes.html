<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR-koder – Bordkort | Harbin Kitchen</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
      background: #FAFAF7;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      color: #2D2A26;
      margin-bottom: 8px;
      font-size: 28px;
    }
    .subtitle {
      text-align: center;
      color: #8A8578;
      margin-bottom: 40px;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #fff;
      border: 2px solid #E8E4DE;
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      page-break-inside: avoid;
    }
    .card__table {
      font-size: 18px;
      font-weight: 700;
      color: #2D2A26;
      margin-bottom: 4px;
    }
    .card__table span {
      font-size: 13px;
      color: #8A8578;
      font-weight: 400;
      margin-left: 4px;
    }
    .card__qr {
      margin: 12px auto;
    }
    .card__qr canvas, .card__qr img {
      display: block;
      margin: 0 auto;
    }
    .card__hint {
      font-size: 11px;
      color: #8A8578;
      margin-top: 8px;
      line-height: 1.3;
    }
    .card__hint strong {
      color: #6B8E23;
    }
    .footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #8A8578;
    }
    @media print {
      body { padding: 20px; }
      h1, .subtitle, .footer { display: none; }
      .grid { gap: 12px; }
      .card { border: 1px solid #ccc; }
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    }
  </style>
</head>
<body>

<h1>🍽️ Harbin Kitchen — Bord QR-koder</h1>
<div class="subtitle">Print denne side, klip hvert kort ud og læg på bordet. Gæster scanner og bestiller direkte!</div>

<div class="grid" id="qr-grid"></div>

<div class="footer">
  Harbin Kitchen · 东北小炒 · QR Bordkort Generator<br>
  Udarbejdet med ❤️
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
const BASE_URL = 'https://thorandloke.github.io/harbin-kitchen/';
const TOTAL_TABLES = 20;

async function generate() {
  const grid = document.getElementById('qr-grid');

  for (let i = 1; i <= TOTAL_TABLES; i++) {
    const url = BASE_URL + '?type=dinein&table=' + i;

    const card = document.createElement('div');
    card.className = 'card';

    const title = document.createElement('div');
    title.className = 'card__table';
    title.innerHTML = `Bord ${i} <span>桌 ${i}</span>`;

    const qrDiv = document.createElement('div');
    qrDiv.className = 'card__qr';

    const hint = document.createElement('div');
    hint.className = 'card__hint';
    hint.innerHTML = currentLangHint();

    card.appendChild(title);
    card.appendChild(qrDiv);
    card.appendChild(hint);
    grid.appendChild(card);

    try {
      const canvas = document.createElement('canvas');
      await QRCode.toCanvas(canvas, url, {
        width: 140,
        margin: 1,
        color: { dark: '#2D2A26', light: '#FFFFFF' }
      });
      qrDiv.appendChild(canvas);
    } catch (err) {
      qrDiv.textContent = 'QR Error';
    }
  }
}

function currentLangHint() {
  return 'Scan for at bestille<br><strong>扫码点餐</strong>';
}

generate();
</script>

</body>
</html>
