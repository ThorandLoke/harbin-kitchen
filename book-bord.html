<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Bord - Harbin Kitchen</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .booking-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .booking-header {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, var(--primary) 0%, #A01830 100%);
      color: white;
      border-radius: 16px;
      margin-bottom: 30px;
    }
    .booking-header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .booking-header p {
      font-size: 16px;
      opacity: 0.9;
    }
    .booking-form {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 15px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }
    .submit-btn:hover {
      background: #A01830;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .success-message {
      display: none;
      text-align: center;
      padding: 50px 30px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      border: 3px solid #28A745;
      animation: successPulse 0.5s ease;
    }
    @keyframes successPulse {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .success-message.show {
      display: block;
    }
    .success-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    .success-message h2 {
      color: #28A745;
      font-size: 24px;
      margin-bottom: 16px;
    }
    .success-message p {
      color: var(--text-light);
      line-height: 1.8;
      margin-bottom: 8px;
      font-size: 16px;
    }
    .success-details {
      background: #F0FFF4;
      border: 1px solid #C3E6CB;
      border-radius: 12px;
      padding: 20px;
      margin: 16px 0;
      font-size: 16px;
      color: var(--text);
    }
    .success-warning {
      background: #FFF8E1;
      border: 2px solid #FFC107;
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
      font-weight: 600;
      color: #F57F17;
      font-size: 15px;
    }
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
    }
    .error-message {
      display: none;
      background: #FEE;
      color: #C00;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .error-message.show {
      display: block;
    }
    .required {
      color: var(--primary);
    }
    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="booking-container">
    <div class="booking-header">
      <h1>🍜 Harbin Kitchen</h1>
      <p>Book et bord / 预订餐桌</p>
    </div>

    <!-- 订桌表单 -->
    <form class="booking-form" id="booking-form">
      <div class="error-message" id="error-message"></div>

      <div class="form-group">
        <label>Navn / 姓名 <span class="required">*</span></label>
        <input type="text" id="booking-name" required placeholder="Indtast dit navn / 请输入姓名">
      </div>

      <div class="form-group">
        <label>Telefon / 手机号 <span class="required">*</span></label>
        <input type="tel" id="booking-phone" required placeholder="f.eks. 12 34 56 78 / 例如 12 34 56 78">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Antal gæster / 人数 <span class="required">*</span></label>
          <select id="booking-guests" required>
            <option value="">Vælg / 选择</option>
            <option value="1">1 person</option>
            <option value="2">2 personer</option>
            <option value="3">3 personer</option>
            <option value="4">4 personer</option>
            <option value="5">5 personer</option>
            <option value="6">6 personer</option>
            <option value="7">7 personer</option>
            <option value="8">8 personer</option>
            <option value="9">9+ personer</option>
            <option value="10">10+ personer</option>
          </select>
        </div>

        <div class="form-group">
          <label>Dato / 日期 <span class="required">*</span></label>
          <input type="date" id="booking-date" required>
        </div>
      </div>

      <div class="form-group">
        <label>Tid / 时间 <span class="required">*</span></label>
        <select id="booking-time" required>
          <option value="">Vælg tid / 选择时间</option>
          <option value="11:30">11:30</option>
          <option value="12:00">12:00</option>
          <option value="12:30">12:30</option>
          <option value="13:00">13:00</option>
          <option value="17:00">17:00</option>
          <option value="17:30">17:30</option>
          <option value="18:00">18:00</option>
          <option value="18:30">18:30</option>
          <option value="19:00">19:00</option>
          <option value="19:30">19:30</option>
          <option value="20:00">20:00</option>
          <option value="20:30">20:30</option>
          <option value="21:00">21:00</option>
        </select>
      </div>

      <div class="form-group">
        <label>Besked / 备注</label>
        <textarea id="booking-notes" placeholder="Allergi, særlige ønsker... / 过敏、特殊要求..."></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">
        Bekræft booking / 确认预订
      </button>
    </form>

    <!-- 成功消息 -->
    <div class="success-message" id="success-message">
      <div class="success-icon">✅</div>
      <h2>Tak for din booking! / 预订成功！</h2>
      <div class="success-details" id="confirmation-details"></div>
      <div class="success-warning">
        ⚠️ Har du ikke modtaget SMS? Ring til os: <a href="tel:+4533294646" style="color:#F57F17;font-weight:700;">33 29 46 46</a><br>
        ⚠️ 如未收到短信，请致电：<a href="tel:+4533294646" style="color:#F57F17;font-weight:700;">33 29 46 46</a>
      </div>
      <a href="index.html" class="back-btn">📋 Tilbage til menu / 返回菜单</a>
    </div>
  </div>

  <!-- 使用和 admin.html 一样的 Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    // 设置最小日期为今天
    const dateInput = document.getElementById('booking-date');
    const today = new Date().toISOString().split('T')[0];
    dateInput.setAttribute('min', today);
    dateInput.value = today;

    // 表单提交 — 通过 Supabase Edge Function（自动发短信）
    document.getElementById('booking-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-message');
      errorMsg.classList.remove('show');
      
      // 收集表单数据
      const booking = {
        name: document.getElementById('booking-name').value.trim(),
        phone: document.getElementById('booking-phone').value.trim(),
        guests: parseInt(document.getElementById('booking-guests').value),
        date: document.getElementById('booking-date').value,
        time: document.getElementById('booking-time').value,
        notes: document.getElementById('booking-notes').value.trim()
      };

      // 验证
      if (!booking.name || !booking.phone || !booking.guests || !booking.date || !booking.time) {
        errorMsg.textContent = '❌ Udfyld alle påkrævede felter / 请填写所有必填项';
        errorMsg.classList.add('show');
        return;
      }

      // 验证手机号格式（丹麦手机号：8位数字）
      const phoneClean = booking.phone.replace(/\s/g, '');
      if (!/^\d{8}$/.test(phoneClean)) {
        errorMsg.textContent = '❌ Indtast et gyldigt telefonnummer (8 cifre) / 请输入有效的8位手机号码';
        errorMsg.classList.add('show');
        return;
      }

      // 禁用按钮
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sender... / 提交中...';

      try {
        // 调用 Edge Function（存预订 + 发短信）
        const response = await fetch(
          'https://glfmoqfevyeeuqbihjht.supabase.co/functions/v1/create-booking',
          {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({
              ...booking,
              phone: phoneClean
            }),
          }
        );

        const result = await response.json();

        if (!response.ok || result.error) {
          throw new Error(result.error || 'Server error');
        }

        // 显示成功消息
        document.getElementById('booking-form').style.display = 'none';
        document.getElementById('success-message').classList.add('show');
        
        const details = `
          <strong>${booking.name}</strong><br>
          📅 ${booking.date} &nbsp; 🕐 ${booking.time}<br>
          👥 ${booking.guests} personer
        `;
        document.getElementById('confirmation-details').innerHTML = details;

      } catch (error) {
        errorMsg.textContent = '❌ ' + error.message + ' / 提交失败，请重试。';
        errorMsg.classList.add('show');
        console.error('Booking error:', error);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Bekræft booking / 确认预订';
      }
    });
  </script>
</body>
</html>
